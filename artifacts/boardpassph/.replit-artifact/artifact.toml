kind = "web"
previewPath = "/"
title = "BoardPassPH"
version = "1.0.0"
id = "artifacts/boardpassph"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22151

[services.development]
run = "pnpm --filter @workspace/boardpassph run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/boardpassph", "run", "build" ]
publicDir = "artifacts/boardpassph/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22151"
BASE_PATH = "/"
